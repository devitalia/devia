name: CI CD Kubernetes

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: devitalia/devia

jobs:
  build_and_push:
    name: Build and Push GHCR image
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR (custom secrets)
        if: ${{ env.GHCR_USERNAME != '' && env.GHCR_TOKEN != '' }}
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.GHCR_USERNAME }}
          password: ${{ env.GHCR_TOKEN }}

      - name: Log in to GHCR (GITHUB_TOKEN fallback)
        if: ${{ !(env.GHCR_USERNAME != '' && env.GHCR_TOKEN != '') }}
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push image
        id: build_push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}

      - name: Export image reference
        id: meta
        run: echo "image_ref=${REGISTRY}/${IMAGE_NAME}:sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

  deploy_kubernetes:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build_and_push
    steps:
      - name: Set up kubeconfig
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          mkdir -p "$HOME/.kube"
          printf '%s' "$KUBE_CONFIG" > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Sync runtime env secret
        env:
          K8S_NAMESPACE: ${{ secrets.K8S_NAMESPACE }}
          K8S_DEPLOYMENT_NAME: ${{ secrets.K8S_DEPLOYMENT_NAME }}
          K8S_CONTAINER_NAME: ${{ secrets.K8S_CONTAINER_NAME }}
          K8S_ENV_FILE: ${{ secrets.K8S_ENV_FILE }}
          K8S_ENV_SECRET_NAME: ${{ secrets.K8S_ENV_SECRET_NAME }}
        run: |
          if [ -z "$K8S_ENV_FILE" ]; then
            echo "K8S_ENV_FILE secret not set, skipping env sync."
            exit 0
          fi

          SECRET_NAME="${K8S_ENV_SECRET_NAME:-devia-env}"
          TMP_ENV_FILE="$(mktemp)"
          printf '%s' "$K8S_ENV_FILE" > "$TMP_ENV_FILE"

          kubectl -n "$K8S_NAMESPACE" create secret generic "$SECRET_NAME" \
            --from-env-file="$TMP_ENV_FILE" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl -n "$K8S_NAMESPACE" set env deployment/"$K8S_DEPLOYMENT_NAME" \
            --containers="$K8S_CONTAINER_NAME" --from=secret/"$SECRET_NAME"

          rm -f "$TMP_ENV_FILE"

      - name: Set deployment image
        env:
          K8S_NAMESPACE: ${{ secrets.K8S_NAMESPACE }}
          K8S_DEPLOYMENT_NAME: ${{ secrets.K8S_DEPLOYMENT_NAME }}
          K8S_CONTAINER_NAME: ${{ secrets.K8S_CONTAINER_NAME }}
          IMAGE_REF: ${{ needs.build_and_push.outputs.image_ref }}
        run: |
          kubectl -n "$K8S_NAMESPACE" set image deployment/"$K8S_DEPLOYMENT_NAME" "$K8S_CONTAINER_NAME"="$IMAGE_REF"
          kubectl -n "$K8S_NAMESPACE" rollout status deployment/"$K8S_DEPLOYMENT_NAME" --timeout=180s
