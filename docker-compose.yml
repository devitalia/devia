version: "3.9"

services:
  devia:
    build: ./devia
    container_name: devia
    env_file:
      - .env
    environment:
      DEVIA_NAME: DevIA
      DEVIA_INSTRUCTIONS_PATH: /instructions
      # DB read-only dal tuo .env (per progetto)
      DEVIA_DB_DSN: ${CHATBOT_DB_RO_DSN}
      # (opzionale) per future azioni: chiamate a Laravel
      DEVIA_LARAVEL_BASE_URL: http://app
      DEVIA_LARAVEL_TOOL_TOKEN: ${CHATBOT_TOOL_TOKEN}
    volumes:
      - ./chatbot/instructions:/instructions:ro
      # opzionale: mount codice repo per RAG futuro
      - ./:/repo:ro
    ports:
      - "8787:8787"
    # se hai già un service "db" nel compose, scommenta e adatta il nome servizio:
    # depends_on:
    #   - db

  # Esempio opzionale di servizio app Laravel (adatta al tuo progetto)
